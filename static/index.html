<!DOCTYPE html>
<html>
<head>

<title>LLM Training Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.poster-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.poster{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
}

.poster h2{
margin:6px;
font-size:38px;
}

.poster span{
color:#94a3b8;
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

canvas{
background:white;
border-radius:8px;
height:240px !important;
}

.table-container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
}

th{
background:#334155;
}

tr:nth-child(even){
background:#1e293b;
}

tr:nth-child(odd){
background:#0f172a;
}

</style>
</head>

<body>

<div class="header">
Training Dashboard
</div>


<div class="poster-grid">

<div class="poster"><span>Step</span><h2 id="step">-</h2></div>
<div class="poster"><span>Train Loss</span><h2 id="loss">-</h2></div>
<div class="poster"><span>Val Loss</span><h2 id="val">-</h2></div>
<div class="poster"><span>Tokens/sec</span><h2 id="tok">-</h2></div>

<div class="poster"><span>Learning Rate</span><h2 id="lr">-</h2></div>
<div class="poster"><span>Grad Norm</span><h2 id="grad">-</h2></div>
<div class="poster"><span>GPU GB</span><h2 id="gpu">-</h2></div>
<div class="poster"><span>Status</span><h2 id="status">waiting</h2></div>

</div>


<div class="chart-grid">

<div class="card">
<h3>Loss</h3>
<canvas id="lossChart"></canvas>
</div>

<div class="card">
<h3>Learning Rate</h3>
<canvas id="lrChart"></canvas>
</div>

<div class="card">
<h3>Tokens/sec</h3>
<canvas id="tokChart"></canvas>
</div>

<div class="card">
<h3>Grad Norm</h3>
<canvas id="gradChart"></canvas>
</div>

</div>


<div class="table-container">

<h3>Latest Metrics</h3>

<table>

<thead>

<tr>
<th>Step</th>
<th>Loss</th>
<th>Val Loss</th>
<th>LR</th>
<th>Grad</th>
<th>Tok/s</th>
<th>GPU</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<script>

function dataset(label,color){

return{

label:label,
data:[],
borderColor:color,
backgroundColor:color,
borderWidth:2,
pointRadius:3,
tension:0.25,
fill:false

}

}

function options(){

return{

animation:false,
responsive:true,

plugins:{
legend:{labels:{color:"white"}}
},

scales:{
x:{ticks:{color:"white",maxTicksLimit:10}},
y:{ticks:{color:"white"}}
}

}

}


const lossChart=new Chart(

document.getElementById("lossChart"),

{
type:"line",

data:{
labels:[],
datasets:[
dataset("train","cyan"),
dataset("val","orange")
]
},

options:options()

}

)


const lrChart=new Chart(

document.getElementById("lrChart"),

{
type:"line",
data:{labels:[],datasets:[dataset("lr","lime")]},
options:options()
}

)


const tokChart=new Chart(

document.getElementById("tokChart"),

{
type:"line",
data:{labels:[],datasets:[dataset("tokens/sec","magenta")]},
options:options()
}

)


const gradChart=new Chart(

document.getElementById("gradChart"),

{
type:"line",
data:{labels:[],datasets:[dataset("grad","red")]},
options:options()
}

)



async function update(){

const res = await fetch("/metrics",{cache:"no-store"})
const data = await res.json()

if(!data.length) return


const train=data.filter(x=>x.type==="train")
const evals=data.filter(x=>x.type==="eval"||x.type==="checkpoint")


const steps=train.map(x=>x.step)

lossChart.data.labels=steps
lossChart.data.datasets[0].data=train.map(x=>x.loss??null)
lossChart.data.datasets[1].data=evals.map(x=>x.val_loss??null)


lrChart.data.labels=steps
lrChart.data.datasets[0].data=train.map(x=>x.lr??null)


tokChart.data.labels=steps
tokChart.data.datasets[0].data=train.map(x=>x.tokens_per_sec??null)


gradChart.data.labels=steps
gradChart.data.datasets[0].data=train.map(x=>x.grad_norm??null)


lossChart.update()
lrChart.update()
tokChart.update()
gradChart.update()


const lastTrain=train[train.length-1]
const lastEval=evals[evals.length-1]


if(lastTrain){

document.getElementById("step").innerText=lastTrain.step
document.getElementById("loss").innerText=lastTrain.loss?.toFixed(3)??"-"
document.getElementById("tok").innerText=lastTrain.tokens_per_sec??"-"
document.getElementById("lr").innerText=lastTrain.lr?.toExponential(2)??"-"
document.getElementById("grad").innerText=lastTrain.grad_norm?.toFixed(2)??"-"
document.getElementById("gpu").innerText=lastTrain.gpu_mem_gb?.toFixed(2)??"-"

}


if(lastEval){

document.getElementById("val").innerText=lastEval.val_loss?.toFixed(3)??"-"

}


document.getElementById("status").innerText="running"

updateTable(data)

}


function updateTable(data){

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

const latest=data.slice(-10).reverse()

latest.forEach(m=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${m.step??""}</td>
<td>${m.loss?.toFixed(4)??""}</td>
<td>${m.val_loss?.toFixed(4)??""}</td>
<td>${m.lr?.toExponential(2)??""}</td>
<td>${m.grad_norm?.toFixed(2)??""}</td>
<td>${m.tokens_per_sec??""}</td>
<td>${m.gpu_mem_gb?.toFixed(2)??""}</td>

`

tbody.appendChild(row)

})

}


setInterval(update,1000)

</script>

</body>
</html>
