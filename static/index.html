<!DOCTYPE html>
<html>
<head>

<title>LLM Training Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:20px;
}

.metric-grid{
grid-column:span 2;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-gap:15px;
}

.poster{

background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;

}

.poster h2{
margin:0;
font-size:32px;
}

.poster p{
margin:5px;
color:#94a3b8;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

canvas{
background:white;
border-radius:8px;
height:220px !important;
}

.table-container{
grid-column:span 2;
background:#1e293b;
padding:15px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
}

th{
background:#334155;
}

tr:nth-child(even){
background:#1e293b;
}

tr:nth-child(odd){
background:#0f172a;
}

</style>
</head>

<body>

<div class="header">
LLM Training Dashboard
</div>

<div class="container">

<div class="metric-grid">

<div class="poster">
<p>Current Step</p>
<h2 id="stepPoster">0</h2>
</div>

<div class="poster">
<p>Train Loss</p>
<h2 id="lossPoster">-</h2>
</div>

<div class="poster">
<p>Validation Loss</p>
<h2 id="valPoster">-</h2>
</div>

<div class="poster">
<p>Tokens/sec</p>
<h2 id="tokPoster">-</h2>
</div>

<div class="poster">
<p>Learning Rate</p>
<h2 id="lrPoster">-</h2>
</div>

<div class="poster">
<p>Grad Norm</p>
<h2 id="gradPoster">-</h2>
</div>

<div class="poster">
<p>GPU Memory</p>
<h2 id="gpuPoster">-</h2>
</div>

<div class="poster">
<p>Status</p>
<h2 id="statusPoster">Waiting</h2>
</div>

</div>

<div class="card">
<h3>Loss</h3>
<canvas id="lossChart"></canvas>
</div>

<div class="card">
<h3>Learning Rate</h3>
<canvas id="lrChart"></canvas>
</div>

<div class="card">
<h3>Tokens/sec</h3>
<canvas id="tokChart"></canvas>
</div>

<div class="card">
<h3>Gradient Norm</h3>
<canvas id="gradChart"></canvas>
</div>

<div class="table-container">

<h3>Latest Metrics</h3>

<table id="metricsTable">

<thead>

<tr>
<th>Step</th>
<th>Train Loss</th>
<th>Val Loss</th>
<th>LR</th>
<th>Grad</th>
<th>Tokens/s</th>
<th>GPU</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

function dataset(label,color){

return{

label:label,
data:[],
borderColor:color,
borderWidth:2,
pointRadius:3,
fill:false,
tension:0.25

}

}

function chartOptions(){

return{

animation:false,
responsive:true,

plugins:{
legend:{labels:{color:"white"}}
},

scales:{
x:{ticks:{color:"white",maxTicksLimit:10}},
y:{ticks:{color:"white"},grid:{color:"#334155"}}
}

}

}

function movingAverage(arr,window=10){

let out=[]

for(let i=0;i<arr.length;i++){

let start=Math.max(0,i-window)

let slice=arr.slice(start,i+1)

let avg=slice.reduce((a,b)=>a+b,0)/slice.length

out.push(avg)

}

return out

}

let lossChart=new Chart(

document.getElementById("lossChart"),

{

type:"line",

data:{
labels:[],
datasets:[
dataset("Train Loss","cyan"),
dataset("Smoothed Loss","white"),
dataset("Val Loss","orange")
]

},

options:chartOptions()

}

)

let lrChart=new Chart(

document.getElementById("lrChart"),

{

type:"line",

data:{labels:[],datasets:[dataset("LR","lime")]},

options:chartOptions()

}

)

let tokChart=new Chart(

document.getElementById("tokChart"),

{

type:"line",

data:{labels:[],datasets:[dataset("Tokens/sec","magenta")]},

options:chartOptions()

}

)

let gradChart=new Chart(

document.getElementById("gradChart"),

{

type:"line",

data:{labels:[],datasets:[dataset("Grad Norm","red")]},

options:chartOptions()

}

)

async function updateCharts(){

const res=await fetch("/metrics")

const data=await res.json()

if(data.length==0) return

const train=data.filter(x=>x.type==="train")

const evals=data.filter(x=>x.type==="eval")

let steps=train.map(x=>x.step)

let loss=train.map(x=>x.loss)

lossChart.data.labels=steps

lossChart.data.datasets[0].data=loss
lossChart.data.datasets[1].data=movingAverage(loss)

lossChart.data.datasets[2].data=
evals.map(x=>({x:x.step,y:x.val_loss}))

lrChart.data.labels=steps
lrChart.data.datasets[0].data=train.map(x=>x.lr)

tokChart.data.labels=steps
tokChart.data.datasets[0].data=train.map(x=>x.tokens_per_sec)

gradChart.data.labels=steps
gradChart.data.datasets[0].data=train.map(x=>x.grad_norm)

lossChart.update()
lrChart.update()
tokChart.update()
gradChart.update()

updateTable(data)
updatePosters(data)

}

function updatePosters(data){

const latest=data[data.length-1]

document.getElementById("stepPoster").innerText=latest.step

if(latest.loss)
document.getElementById("lossPoster").innerText=
latest.loss.toFixed(3)

if(latest.val_loss)
document.getElementById("valPoster").innerText=
latest.val_loss.toFixed(3)

if(latest.tokens_per_sec)
document.getElementById("tokPoster").innerText=
latest.tokens_per_sec

if(latest.lr)
document.getElementById("lrPoster").innerText=
latest.lr.toExponential(2)

if(latest.grad_norm)
document.getElementById("gradPoster").innerText=
latest.grad_norm.toFixed(2)

if(latest.gpu_mem_gb)
document.getElementById("gpuPoster").innerText=
latest.gpu_mem_gb.toFixed(2)

document.getElementById("statusPoster").innerText="Running"

}

function updateTable(data){

const tbody=document.querySelector("#metricsTable tbody")

tbody.innerHTML=""

const latest=data.slice(-10).reverse()

latest.forEach(m=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${m.step??""}</td>
<td>${m.loss?.toFixed(4)??""}</td>
<td>${m.val_loss?.toFixed(4)??""}</td>
<td>${m.lr?.toExponential(2)??""}</td>
<td>${m.grad_norm?.toFixed(2)??""}</td>
<td>${m.tokens_per_sec??""}</td>
<td>${m.gpu_mem_gb?.toFixed(2)??""}</td>

`

tbody.appendChild(row)

})

}

setInterval(updateCharts,1000)

</script>

</body>
</html>
