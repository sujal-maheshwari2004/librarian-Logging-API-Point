<!DOCTYPE html>
<html>
<head>

<title>LLM Training Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:16px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:20px;
}

.metric-grid{
grid-column:span 2;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-gap:15px;
}

.poster{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.poster h2{
margin:0;
font-size:32px;
}

.poster p{
margin:5px;
color:#94a3b8;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

canvas{
background:white;
border-radius:8px;
height:220px !important;
}

</style>

</head>

<body>

<div class="header">
LLM Training Dashboard
</div>

<div class="container">

<div class="metric-grid">

<div class="poster"><p>Step</p><h2 id="stepPoster">-</h2></div>
<div class="poster"><p>Train Loss</p><h2 id="lossPoster">-</h2></div>
<div class="poster"><p>Val Loss</p><h2 id="valPoster">-</h2></div>
<div class="poster"><p>Tokens/sec</p><h2 id="tokPoster">-</h2></div>

<div class="poster"><p>Learning Rate</p><h2 id="lrPoster">-</h2></div>
<div class="poster"><p>Grad Norm</p><h2 id="gradPoster">-</h2></div>
<div class="poster"><p>GPU Memory</p><h2 id="gpuPoster">-</h2></div>
<div class="poster"><p>Status</p><h2 id="statusPoster">Waiting</h2></div>

</div>

<div class="card">
<h3>Loss</h3>
<canvas id="lossChart"></canvas>
</div>

<div class="card">
<h3>Learning Rate</h3>
<canvas id="lrChart"></canvas>
</div>

<div class="card">
<h3>Tokens/sec</h3>
<canvas id="tokChart"></canvas>
</div>

<div class="card">
<h3>Gradient Norm</h3>
<canvas id="gradChart"></canvas>
</div>

</div>

<script>

function dataset(label,color){
return{
label:label,
data:[],
borderColor:color,
borderWidth:2,
pointRadius:3,
fill:false,
tension:0.25
}
}

function chartOptions(){
return{
animation:false,
responsive:true,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white",maxTicksLimit:10}},
y:{ticks:{color:"white"},grid:{color:"#334155"}}
}
}
}

function movingAverage(arr,window=10){

let result=[]

for(let i=0;i<arr.length;i++){

let start=Math.max(0,i-window)

let slice=arr.slice(start,i+1)

let avg=slice.reduce((a,b)=>a+b,0)/slice.length

result.push(avg)

}

return result

}

let lossChart=new Chart(
document.getElementById("lossChart"),
{
type:"line",
data:{
labels:[],
datasets:[
dataset("Train Loss","cyan"),
dataset("Smoothed","white"),
dataset("Val Loss","orange")
]
},
options:chartOptions()
}
)

let lrChart=new Chart(
document.getElementById("lrChart"),
{
type:"line",
data:{labels:[],datasets:[dataset("LR","lime")]},
options:chartOptions()
}
)

let tokChart=new Chart(
document.getElementById("tokChart"),
{
type:"line",
data:{labels:[],datasets:[dataset("Tokens/sec","magenta")]},
options:chartOptions()
}
)

let gradChart=new Chart(
document.getElementById("gradChart"),
{
type:"line",
data:{labels:[],datasets:[dataset("Grad Norm","red")]},
options:chartOptions()
}
)

async function updateCharts(){

const res=await fetch("/metrics")
const data=await res.json()

if(!data || data.length===0){
document.getElementById("statusPoster").innerText="Waiting"
return
}

const train=data.filter(x=>x.type==="train")

const evals=data.filter(x=>x.type==="eval")

const steps=[]
const losses=[]
const lr=[]
const tok=[]
const grad=[]

train.forEach(m=>{

steps.push(m.step)

losses.push(m.loss ?? null)

lr.push(m.lr ?? null)

tok.push(m.tokens_per_sec ?? null)

grad.push(m.grad_norm ?? null)

})

lossChart.data.labels=steps

lossChart.data.datasets[0].data=losses

lossChart.data.datasets[1].data=movingAverage(losses.filter(x=>x!=null))

lossChart.data.datasets[2].data=
evals.map(x=>({x:x.step,y:x.val_loss}))

lrChart.data.labels=steps
lrChart.data.datasets[0].data=lr

tokChart.data.labels=steps
tokChart.data.datasets[0].data=tok

gradChart.data.labels=steps
gradChart.data.datasets[0].data=grad

lossChart.update()
lrChart.update()
tokChart.update()
gradChart.update()

updatePosters(data)

}

function updatePosters(data){

const latest=data[data.length-1]

document.getElementById("stepPoster").innerText=latest.step ?? "-"

if(latest.loss!=null)
document.getElementById("lossPoster").innerText=latest.loss.toFixed(3)

if(latest.val_loss!=null)
document.getElementById("valPoster").innerText=latest.val_loss.toFixed(3)

if(latest.tokens_per_sec!=null)
document.getElementById("tokPoster").innerText=latest.tokens_per_sec

if(latest.lr!=null)
document.getElementById("lrPoster").innerText=latest.lr.toExponential(2)

if(latest.grad_norm!=null)
document.getElementById("gradPoster").innerText=latest.grad_norm.toFixed(2)

if(latest.gpu_mem_gb!=null)
document.getElementById("gpuPoster").innerText=latest.gpu_mem_gb.toFixed(2)

document.getElementById("statusPoster").innerText="Running"

}

setInterval(updateCharts,1000)

</script>

</body>
</html>
