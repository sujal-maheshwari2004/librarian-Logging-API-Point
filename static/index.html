<!DOCTYPE html>
<html>
<head>
<title>LLM Training Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

.header{
    background:#1e293b;
    padding:15px;
    font-size:22px;
    text-align:center;
    font-weight:bold;
    position:relative;
}

.clear-btn{
    position:absolute;
    right:20px;
    top:12px;
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.clear-btn:hover{
    background:#dc2626;
}

.container{
    padding:15px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-gap:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

canvas{
    background:white;
    border-radius:8px;
    height:200px !important;
}

.table-container{
    grid-column: span 2;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    text-align:center;
}

th{
    background:#334155;
}

tr:nth-child(even){
    background:#1e293b;
}

tr:nth-child(odd){
    background:#0f172a;
}

</style>
</head>

<body>

<div class="header">
LLM Training Dashboard
<button class="clear-btn" onclick="clearMetrics()">Clear Data</button>
</div>

<div class="container">

<div class="card">
<h3>Loss</h3>
<canvas id="lossChart"></canvas>
</div>

<div class="card">
<h3>Learning Rate</h3>
<canvas id="lrChart"></canvas>
</div>

<div class="card">
<h3>Throughput (Tokens/sec)</h3>
<canvas id="tokChart"></canvas>
</div>

<div class="card">
<h3>GPU Memory (GB)</h3>
<canvas id="gpuChart"></canvas>
</div>

<div class="table-container">
<h3>Latest Metrics</h3>

<table id="metricsTable">
<thead>
<tr>
<th>Step</th>
<th>Train Loss</th>
<th>Val Loss</th>
<th>LR</th>
<th>Grad Norm</th>
<th>Tokens/sec</th>
<th>GPU GB</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

</div>

</div>

<script>

function chartOptions(){
return {
animation:false,
responsive:true,
plugins:{
legend:{labels:{color:"white"}}
},
scales:{
x:{ticks:{color:"white"}},
y:{
ticks:{color:"white"},
grid:{color:"#334155"}
}
}
};
}

function dataset(label,color){
return {
label:label,
data:[],
borderColor:color,
borderWidth:2,
pointRadius:4,
pointHoverRadius:6,
fill:false,
tension:0.25
};
}

let lossChart = new Chart(
document.getElementById("lossChart"),
{
type:"line",
data:{
labels:[],
datasets:[
dataset("Train Loss","cyan"),
dataset("Validation Loss","orange")
]
},
options:chartOptions()
}
);

let lrChart = new Chart(
document.getElementById("lrChart"),
{
type:"line",
data:{
labels:[],
datasets:[dataset("Learning Rate","lime")]
},
options:chartOptions()
}
);

let tokChart = new Chart(
document.getElementById("tokChart"),
{
type:"line",
data:{
labels:[],
datasets:[dataset("Tokens/sec","magenta")]
},
options:chartOptions()
}
);

let gpuChart = new Chart(
document.getElementById("gpuChart"),
{
type:"line",
data:{
labels:[],
datasets:[dataset("GPU Memory","yellow")]
},
options:chartOptions()
}
);

function updateTable(data){

const tbody = document.querySelector("#metricsTable tbody");
tbody.innerHTML = "";

const latest = data.slice(-10).reverse();

latest.forEach(m=>{

const row = document.createElement("tr");

row.innerHTML = `
<td>${m.step ?? ""}</td>
<td>${m.loss?.toFixed(4) ?? ""}</td>
<td>${m.val_loss?.toFixed(4) ?? ""}</td>
<td>${m.lr?.toExponential(2) ?? ""}</td>
<td>${m.grad_norm?.toFixed(2) ?? ""}</td>
<td>${m.tokens_per_sec ?? ""}</td>
<td>${m.gpu_mem_gb?.toFixed(2) ?? ""}</td>
`;

tbody.appendChild(row);

});
}

async function updateCharts(){

const res = await fetch("/metrics");
const data = await res.json();

if(data.length === 0) return;

const train = data.filter(x=>x.type==="train");
const evals = data.filter(x=>x.type==="eval");

lossChart.data.labels = train.map(x=>x.step);
lossChart.data.datasets[0].data = train.map(x=>x.loss);

lossChart.data.datasets[1].data =
evals.map(x=>({x:x.step,y:x.val_loss}));

lrChart.data.labels = train.map(x=>x.step);
lrChart.data.datasets[0].data =
train.map(x=>x.lr);

tokChart.data.labels = train.map(x=>x.step);
tokChart.data.datasets[0].data =
train.map(x=>x.tokens_per_sec);

gpuChart.data.labels = train.map(x=>x.step);
gpuChart.data.datasets[0].data =
train.map(x=>x.gpu_mem_gb);

lossChart.update();
lrChart.update();
tokChart.update();
gpuChart.update();

updateTable(data);

}

async function clearMetrics(){

if(!confirm("Clear all dashboard data?")) return;

await fetch("/clear",{method:"POST"});

lossChart.data.labels=[];
lossChart.data.datasets.forEach(d=>d.data=[]);

lrChart.data.labels=[];
lrChart.data.datasets.forEach(d=>d.data=[]);

tokChart.data.labels=[];
tokChart.data.datasets.forEach(d=>d.data=[]);

gpuChart.data.labels=[];
gpuChart.data.datasets.forEach(d=>d.data=[]);

lossChart.update();
lrChart.update();
tokChart.update();
gpuChart.update();

document.querySelector("#metricsTable tbody").innerHTML="";

}

setInterval(updateCharts,1000);

</script>

</body>
</html>
